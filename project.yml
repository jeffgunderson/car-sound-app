name: CarSoundApp
options:
  bundleIdPrefix: com.jeffgunderson
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
targets:
  CarSoundApp:
    type: application
    platform: iOS
    sources:
      - path: CarSoundApp
        excludes:
          - Resources/**
      - path: CarSoundApp/Resources/Sounds/TundraTRD
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeffgunderson.CarSoundApp
        INFOPLIST_KEY_CFBundleDisplayName: Active Engine Sound
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: Connect to vLinker OBD-II adapter for live vehicle data.
        INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: Connect to vLinker OBD-II adapter for live vehicle data.
