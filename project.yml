name: CarSoundApp
options:
  bundleIdPrefix: com.jeffgunderson
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
targets:
  CarSoundApp:
    type: application
    platform: iOS
    sources:
      - path: CarSoundApp
        excludes:
          - Resources/**
      - path: CarSoundApp/Resources/Sounds/TundraTRD
        buildPhase: resources
      - path: CarSoundApp/Resources/Fonts
        buildPhase: resources
    info:
      path: CarSoundApp/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Active Engine Sound
        NSBluetoothAlwaysUsageDescription: Connect to vLinker OBD-II adapter for live vehicle data.
        NSBluetoothPeripheralUsageDescription: Connect to vLinker OBD-II adapter for live vehicle data.
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeffgunderson.CarSoundApp
        TARGETED_DEVICE_FAMILY: "1"
